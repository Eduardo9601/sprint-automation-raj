name: Sprint Semanal - RAJ

on:
  schedule:
    # Toda segunda-feira às 08:00 (horário de Brasília = 11:00 UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch:
    # Permite rodar manualmente pelo botão "Run workflow"

jobs:
  criar-sprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Executar automação
        env:
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          BOARD_ID: ${{ secrets.BOARD_ID }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python sprint_automation.py
